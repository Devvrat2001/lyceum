# Gated-deploy CI — the full verification gauntlet on every push to
# master, with production deploys fired ONLY on green.
#
# How the gate works (one-time setup, in this order):
#   1. Vercel → Account Settings → Tokens: create a token scoped to the
#      team that owns this project.
#   2. GitHub → repo → Settings → Secrets and variables → Actions: add
#      a REPOSITORY secret named VERCEL_TOKEN with that token.
#   3. Vercel → Project → Settings → Build and Deployment → "Ignored
#      Build Step": "Don't build anything". Git pushes then never
#      auto-build — they appear as Canceled in the deploy list — and
#      the deploy job below is the only path to production.
#
# Why this exact shape (all three learned the hard way, 2026-06-11):
#   - NOT a Deploy Hook: hook-triggered builds are subject to the
#     Ignored Build Step too — the hook fired and its deployment came
#     out CANCELED.
#   - NOT `vercel build` + `deploy --prebuilt`: this project's env vars
#     are marked Sensitive on Vercel, and `vercel pull` writes Sensitive
#     values as EMPTY strings — the build then fails env validation
#     (and `prisma migrate deploy` would have no real DATABASE_URL).
#   - Plain `vercel deploy --prod` works: it uploads the source and
#     Vercel builds remotely where Sensitive env IS available, and CLI
#     deployments BYPASS the Ignored Build Step (verified live — the
#     gate only cancels git-push and hook builds).
#
# Until VERCEL_TOKEN is set the deploy job skips with a notice.
#
# The Postgres service uses the pgvector image — the schema has a
# vector(1536) column and the `CREATE EXTENSION vector` migration would
# fail on the stock postgres image.
name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lyceum
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/lyceum
      NEXTAUTH_SECRET: ci-only-dummy-secret-0123456789abcdef
      PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # The seed script (`tsx --env-file=.env.local --env-file=.env`)
      # and vitest's env loader both read these files and error/skip when
      # they're absent — mirror the local contract instead of fighting it.
      - name: Write CI env files
        run: |
          cat > .env.local <<EOF
          DATABASE_URL=$DATABASE_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          PUBLIC_BASE_URL=$PUBLIC_BASE_URL
          EOF
          touch .env

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      # Idempotent demo seed — the suite is known-green against a seeded
      # DB (matches every local verify cycle), so CI runs the same way.
      - run: npm run db:seed

      - run: npx tsc --noEmit

      - run: npx eslint src test e2e

      - run: npx vitest run

      # `npm run build` re-runs generate + migrate deploy (idempotent)
      # then next build — the same script Vercel executes.
      - run: npm run build

  # Browser smokes (Playwright, chromium): real cookies, Auth.js
  # session, tRPC-over-HTTP — the layer vitest deliberately skips.
  # Runs in parallel with `verify` against its own DB service; the
  # playwright config boots `npm run dev` itself (webServer block).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lyceum
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/lyceum
      NEXTAUTH_SECRET: ci-only-dummy-secret-0123456789abcdef
      PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Write CI env files
        run: |
          cat > .env.local <<EOF
          DATABASE_URL=$DATABASE_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          PUBLIC_BASE_URL=$PUBLIC_BASE_URL
          EOF
          touch .env

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      # The specs assert against seeded demo content (quick-login
      # buttons, the multiplying-fractions MCQ, the paid course).
      - run: npm run db:seed

      - run: npx playwright install --with-deps chromium

      - run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [verify, e2e]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Not secrets — these ids appear in every deployment URL / API
      # response. They stand in for the .vercel/project.json link file.
      VERCEL_ORG_ID: team_PQZMPoTZFxScDAwAX7EgmvhH
      VERCEL_PROJECT_ID: prj_gsc5DZUhGg4x75pRD7BZgT5zWwcB
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # Uploads the source; Vercel builds remotely with the project's
      # real (Sensitive) env and applies prisma migrations there. The
      # command blocks until the deployment is READY and exits non-zero
      # if the remote build fails, so a red remote build = red CI.
      - name: Deploy to Vercel (remote build, production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret not set — skipping deploy."
            echo "(One-time setup lives in the header of this file.)"
            exit 0
          fi
          npx vercel@latest deploy --prod --token="$VERCEL_TOKEN"
