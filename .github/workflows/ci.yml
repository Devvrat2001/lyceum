# Gated-deploy CI — the full verification gauntlet on every push to
# master, with production deploys fired ONLY on green.
#
# How the gate works (one-time Vercel setup, in this order):
#   1. Vercel → Project → Settings → Git → Deploy Hooks: create a hook
#      for the `master` branch, copy its URL.
#   2. GitHub → repo → Settings → Secrets → Actions: add
#      VERCEL_DEPLOY_HOOK with that URL.
#   3. Vercel → Project → Settings → Git → Ignored Build Step: set the
#      command to `exit 0`. Git pushes then never auto-build — but
#      Deploy Hooks BYPASS the ignored build step, so the curl at the
#      end of this workflow is what triggers the real deploy.
# Until steps 1–3 are done this workflow is a tripwire only: it runs
# the suite and skips the deploy step with a notice, while Vercel keeps
# auto-deploying as before. Safe to land first, flip the gate later.
#
# The Postgres service uses the pgvector image — the schema has a
# vector(1536) column and the `CREATE EXTENSION vector` migration would
# fail on the stock postgres image.
name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lyceum
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/lyceum
      NEXTAUTH_SECRET: ci-only-dummy-secret-0123456789abcdef
      PUBLIC_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # The seed script (`tsx --env-file=.env.local --env-file=.env`)
      # and vitest's env loader both read these files and error/skip when
      # they're absent — mirror the local contract instead of fighting it.
      - name: Write CI env files
        run: |
          cat > .env.local <<EOF
          DATABASE_URL=$DATABASE_URL
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          PUBLIC_BASE_URL=$PUBLIC_BASE_URL
          EOF
          touch .env

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      # Idempotent demo seed — the suite is known-green against a seeded
      # DB (matches every local verify cycle), so CI runs the same way.
      - run: npm run db:seed

      - run: npx tsc --noEmit

      - run: npx eslint src test

      - run: npx vitest run

      # `npm run build` re-runs generate + migrate deploy (idempotent)
      # then next build — the same script Vercel executes.
      - run: npm run build

      - name: Trigger Vercel production deploy (green builds only)
        if: github.ref == 'refs/heads/master'
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — skipping deploy trigger."
            echo "(Vercel keeps auto-deploying on push until the Ignored Build Step gate is flipped — see the header of this file.)"
            exit 0
          fi
          curl -fsS -X POST "$HOOK" >/dev/null
          echo "Deploy hook fired — Vercel is building this commit."
