services:
  postgres:
    image: postgres:16-alpine
    container_name: lyceum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lyceum
      POSTGRES_PASSWORD: lyceum_dev
      POSTGRES_DB: lyceum
    ports:
      - "5433:5432"
    volumes:
      - lyceum_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyceum -d lyceum"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lyceum_pg_data:
