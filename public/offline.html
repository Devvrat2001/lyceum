<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f1d1a" />
    <title>Offline · Lyceum</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fbfaf5;
        color: #1f1d1a;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, Helvetica, Arial, sans-serif;
      }
      .card {
        max-width: 420px;
        padding: 40px 32px;
        text-align: center;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: #1f1d1a;
        color: #fbfaf5;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 30px;
        font-weight: 700;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.55;
        color: #5b574f;
        margin: 0 0 22px;
      }
      button {
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: #1f1d1a;
        color: #fbfaf5;
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
      }
      .hint {
        margin-top: 16px;
        font-family: ui-monospace, "JetBrains Mono", "SFMono-Regular", monospace;
        font-size: 11px;
        letter-spacing: 0.04em;
        color: #8a857c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">L</div>
      <h1>You're offline</h1>
      <p>
        Lyceum can't reach the network right now. Pages you've already opened
        may still load from your device — reconnect and try again to pick up
        where you left off.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
      <div class="hint">LYCEUM · OFFLINE</div>
    </div>
  </body>
</html>
